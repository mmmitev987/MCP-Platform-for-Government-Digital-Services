# nginx/nginx.conf — Production reverse proxy for GovMCP (Docker)
# Replace mcp.prodanov.dev with your actual domain (e.g. govmcp.mk)
# SSL certificates managed by Let's Encrypt (certbot)
#
# Services referenced by Docker service name (resolved inside mcp_net):
#   backend  → port 8000 (FastAPI)
#   frontend → port 80   (nginx serving React build)

events {
    worker_connections 1024;
}

http {
    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name mcp.prodanov.dev www.mcp.prodanov.dev;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name mcp.prodanov.dev www.mcp.prodanov.dev;

        # SSL certificates (generated by: certbot certonly --standalone -d mcp.prodanov.dev)
        ssl_certificate     /etc/letsencrypt/live/mcp.prodanov.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mcp.prodanov.dev/privkey.pem;

        # Strong SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── FastAPI backend ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket / SSE chat streaming endpoint ───────────────────────────
        location /api/chat/stream {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE / long-poll settings
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # ── React frontend (catch-all) ────────────────────────────────────────
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
